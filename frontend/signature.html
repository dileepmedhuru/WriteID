<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Verification - WriteID</title>
    <link rel="icon" type="image/png" href="logo_transparent.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Rochester&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div id="nav-top-mask" style="position:fixed;top:0;left:0;right:0;height:16px;background:#080c14;z-index:999;pointer-events:none;"></div>
    <div class="bg-glow-container">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>
    <div class="bg-grid-overlay"></div>
    <div class="home">
        <div class="rectangle">
            <a href="home.html" class="logo-link">
                <div class="left">
                    <img src="logo_transparent.png" class="left">
                </div>
                <div class="right">
                    <h1>WriteID</h1>
                </div>
            </a>
            <div class="nav-menu" id="nav-menu">
                <a href="home.html" class="nav-link">Home</a>
            </div>
        </div>
        <div class="mid">
            <div class="first">
                <div class="preview-box"></div>
                <div class="line"></div>
                <div class="btn-group">
                    <button class="upload-btn">Upload reference signature</button>
                    <button class="camera-btn" data-slot="sample" title="Capture from Camera"><i class="bi bi-camera-fill"></i></button>
                </div>
            </div>
            <div class="second">
                <div class="preview-box"></div>
                <div class="line"></div>
                <div class="btn-group">
                    <button class="upload-btn">Upload test signature</button>
                    <button class="camera-btn" data-slot="handwriting" title="Capture from Camera"><i class="bi bi-camera-fill"></i></button>
                </div>
            </div>
        </div>
        <div class="final" id="verify-sig-btn">Verify</div>

        <p id="result"></p>
    </div>

    <!-- Fullscreen Camera Scan Modal -->
    <div id="camera-modal" class="camera-modal" style="display: none;">
        <div class="camera-container">
            <div class="camera-header">
                <h3><i class="bi bi-camera-fill"></i> Document Scanner</h3>
                <button id="close-camera" class="close-camera-btn"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="camera-view">
                <video id="camera-video" autoplay playsinline></video>
                <div class="scanner-guide">
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>
                </div>
            </div>
            <div class="camera-controls">
                <button id="shutter-btn" class="shutter-btn" title="Capture Document"></button>
            </div>
        </div>
    </div>
</body>
</html>

<script src="script.js"></script>
