<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WriteID</title>
    <link rel="icon" type="image/png" href="logo_transparent.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Rochester&display=swap" rel="stylesheet">
</head>
<body>
<div id="nav-top-mask" style="position:fixed;top:0;left:0;right:0;height:16px;background:#080c14;z-index:999;pointer-events:none;"></div>
    <div class="bg-glow-container">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>
    <div class="bg-grid-overlay"></div>
    <div class="home">
        <div class="rectangle">
            <a href="index.html" class="logo-link">
                <div class="left">
                    <img src="logo_transparent.png" class="left">
                </div>
                <div class="right">
                    <h1>WriteID</h1>
                </div>
            </a>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
            </div>
        </div>

        <div class="auth-container">
            <div class="auth-card">
                <h2>Welcome Back</h2>
                <p class="auth-subtitle">Verify your identity with WriteID</p>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="Enter email address">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="Enter password">
                    </div>
                    
                    <button type="submit" class="auth-btn">Sign In</button>
                </form>
                
                <p class="auth-switch">Don't have an account? <a href="signup.html">Register</a></p>
                <p id="auth-error" class="error-msg"></p>
            </div>
        </div>

        <div class="footer">
            <div class="quots">Handwriting<br>Recognition</div>
            <div class="summary">We will detect<br>who are you</div>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
