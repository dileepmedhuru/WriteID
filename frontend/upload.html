<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writer Identification – WriteID</title>
    <meta name="description" content="Upload handwriting samples to verify writer identity using deep learning AI.">
    <link rel="icon" type="image/png" href="logo_transparent.png">
    <link rel="stylesheet" href="style.css?v=1.0.4">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Rochester&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>


        /* Page header */
        .page-header {
            text-align: center;
            padding: 20px 20px 10px;
            width: 90%;
            max-width: 700px;
            margin: 0 auto 10px;
        }

        .page-header .breadcrumb {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            margin-bottom: 14px;
        }

        .page-header .breadcrumb a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
        }

        .page-header h1 {
            font-size: clamp(24px, 3.5vw, 36px);
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 15px;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
<div id="nav-top-mask" style="position:fixed;top:0;left:0;right:0;height:16px;background:#080c14;z-index:999;pointer-events:none;"></div>
    <div class="bg-glow-container">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>
    <div class="bg-grid-overlay"></div>

    <!-- Floating App Navbar -->
    <nav class="app-navbar" id="appNavbar">
        <a href="home.html" class="app-navbar-brand">
            <img src="logo_transparent.png" alt="WriteID Logo">
            <span class="brand-name">WriteID</span>
        </a>
        <div class="app-navbar-right" id="nav-menu">
            <!-- Filled by script.js -->
        </div>
        <button class="app-nav-hamburger" id="appNavHamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <div class="home page-with-nav">
        <div class="page-header">
            <div class="breadcrumb">
                <a href="home.html"><i class="bi bi-house-fill"></i> Dashboard</a>
                <span>›</span>
                <span>Writer Identification</span>
            </div>
            <h1>Handwriting Comparison</h1>
            <p>Upload two handwriting samples to verify if they belong to the same writer</p>
        </div>

        <div class="mid">
            <div class="first">
                <div class="preview-box"></div>
                <div class="line"></div>
                <div class="btn-group">
                    <button class="upload-btn">Upload sample</button>
                    <button class="camera-btn" data-slot="sample" title="Capture from Camera"><i class="bi bi-camera-fill"></i></button>
                </div>
            </div>
            <div class="second">
                <div class="preview-box"></div>
                <div class="line"></div>
                <div class="btn-group">
                    <button class="upload-btn">Upload handwriting</button>
                    <button class="camera-btn" data-slot="handwriting" title="Capture from Camera"><i class="bi bi-camera-fill"></i></button>
                </div>
            </div>
        </div>
        <div class="final">Check</div>

        <p id="result"></p>
    </div>

    <!-- Fullscreen Camera Scan Modal -->
    <div id="camera-modal" class="camera-modal" style="display: none;">
        <div class="camera-container">
            <div class="camera-header">
                <h3><i class="bi bi-camera-fill"></i> Document Scanner</h3>
                <button id="close-camera" class="close-camera-btn"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="camera-view">
                <video id="camera-video" autoplay playsinline></video>
                <div class="scanner-guide">
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>
                </div>
            </div>
            <div class="camera-controls">
                <button id="shutter-btn" class="shutter-btn" title="Capture Document"></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const navbar = document.getElementById('appNavbar');
        window.addEventListener('scroll', () => {
            navbar.classList.toggle('scrolled', window.scrollY > 30);
        });
    </script>
</body>
</html>
